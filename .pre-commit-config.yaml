# Run locally before pushing: `pre-commit run --all-files`
# Install: `pip install pre-commit && pre-commit install`
# CI does not currently run pre-commit (handled by ruff + claude-review workflow);
# this is a local catch-early layer that mirrors the conventions in .claude/rules/python.md.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: validate-plugin
        name: validate plugin layout (manifest, AGENTS.md, orphans)
        entry: python3 scripts/validate_plugin.py
        language: system
        pass_filenames: false
        always_run: true
