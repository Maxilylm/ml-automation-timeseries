name: Weekly tech-debt audit (poll + create issues)

on:
  schedule:
    # Every 4 hours.  With a 24-hour Anthropic Batches SLA this gives ≥6 polling
    # attempts before the SLA expires — well within the "overnight turnaround"
    # goal (TS 4.5).
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  poll-and-file-issues:
    name: Poll batch results and create GH issues
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ── Gate ─────────────────────────────────────────────────────────────
      - name: Skip cleanly when ANTHROPIC_API_KEY is not set
        id: gate
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set on this repo; skipping audit poll"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Checkout + Python ─────────────────────────────────────────────────
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip == 'false'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip == 'false'
        with:
          python-version: "3.11"

      # ── Discover pending audit-batch artifacts and process each one ───────
      #
      # Artifact naming:
      #   Submission workflow uploads:  audit-batch-<run_id>   (contains audit-batch-id.txt)
      #   This workflow uploads:        processed-batch-<batch_id>  (idempotency marker)
      #
      # For each audit-batch-* artifact created in the last 48h:
      #   1. Download it, read the Anthropic batch ID.
      #   2. Check whether a processed-batch-<batch_id> artifact already exists.
      #   3. If not processed: call process_audit_results.py.
      #      - Script exits 0 and writes  audit-complete-<batch_id>.marker  if done.
      #      - Script exits 0 without the marker if the batch is still running.
      #      - Script exits non-zero on hard errors.
      #   4. If marker file present: upload processed-batch-<batch_id> artifact.
      - name: Discover and process pending audit batches
        if: steps.gate.outputs.skip == 'false'
        id: process
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          # List artifacts whose name starts with "audit-batch-" created within the last 48h.
          ARTIFACTS_JSON=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq '[
              .artifacts[]
              | select(
                  (.name | startswith("audit-batch-"))
                  and ((.created_at | fromdateiso8601) > (now - 172800))
                  and (.expired == false)
                )
              | {name: .name, run_id: (.workflow_run.id | tostring)}
            ]')

          echo "Found artifacts: $ARTIFACTS_JSON"

          PENDING_COUNT=$(echo "$ARTIFACTS_JSON" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Pending audit-batch artifacts: $PENDING_COUNT"

          if [ "$PENDING_COUNT" -eq 0 ]; then
            echo "No pending artifacts found in the last 48h."
            exit 0
          fi

          # Iterate over each artifact
          echo "$ARTIFACTS_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data:
              print(item['name'] + '|' + item['run_id'])
          " | while IFS='|' read -r ARTIFACT_NAME RUN_ID; do

            echo "=== Processing artifact: $ARTIFACT_NAME (run $RUN_ID) ==="

            # Download the artifact
            DOWNLOAD_DIR="$RUNNER_TEMP/audit-dl-${RUN_ID}"
            mkdir -p "$DOWNLOAD_DIR"
            if ! gh run download "$RUN_ID" \
                --name "$ARTIFACT_NAME" \
                --dir "$DOWNLOAD_DIR" 2>/dev/null; then
              echo "::warning::Could not download $ARTIFACT_NAME — skipping."
              continue
            fi

            BATCH_ID_FILE="$DOWNLOAD_DIR/audit-batch-id.txt"
            if [ ! -f "$BATCH_ID_FILE" ]; then
              echo "::warning::audit-batch-id.txt not found in $ARTIFACT_NAME — skipping."
              continue
            fi

            BATCH_ID=$(tr -d '[:space:]' < "$BATCH_ID_FILE")
            echo "Anthropic batch ID: $BATCH_ID"

            # Idempotency check (PM3-88 fix): the original implementation searched
            # for a per-batch artifact named processed-batch-<id> that was never
            # actually uploaded — every poll therefore reprocessed every batch
            # for 30 days, multiplying GH-issue noise and Anthropic credits.
            #
            # Fix: list all processed-batches-<run_id> artifacts (the COMBINED
            # ones that ARE actually uploaded by this workflow's final step),
            # download each, and grep their contents for this BATCH_ID. If
            # found, the batch was processed by a previous poll run.
            BATCH_PROCESSED=false
            COMBINED_ARTIFACTS=$(gh api \
              "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
              --jq "[.artifacts[] | select((.name | startswith(\"processed-batches-\")) and .expired == false) | {name, run_id: (.workflow_run.id | tostring)}]")

            COMBINED_COUNT=$(echo "$COMBINED_ARTIFACTS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
            if [ "${COMBINED_COUNT:-0}" -gt 0 ]; then
              # Iterate, download, grep
              while IFS='|' read -r CBN_NAME CBN_RUN; do
                [ -z "$CBN_NAME" ] && continue
                CBN_DIR="$RUNNER_TEMP/processed-check-$CBN_RUN"
                mkdir -p "$CBN_DIR"
                if gh run download "$CBN_RUN" --name "$CBN_NAME" --dir "$CBN_DIR" 2>/dev/null; then
                  if grep -Fq "$BATCH_ID" "$CBN_DIR"/*.txt 2>/dev/null; then
                    BATCH_PROCESSED=true
                    break
                  fi
                fi
              done < <(echo "$COMBINED_ARTIFACTS" | python3 -c "import sys,json; [print(it['name']+'|'+it['run_id']) for it in json.load(sys.stdin)]")
            fi

            if [ "$BATCH_PROCESSED" = "true" ]; then
              echo "Batch $BATCH_ID already processed (found in a prior processed-batches-* artifact). Skipping."
              continue
            fi

            # Run the processing script
            set +e
            python scripts/process_audit_results.py \
              --batch-id "$BATCH_ID" \
              --repo "$GITHUB_REPOSITORY"
            PROC_EXIT=$?
            set -e

            if [ "$PROC_EXIT" -ne 0 ]; then
              echo "::error::process_audit_results.py exited $PROC_EXIT for batch $BATCH_ID"
              continue
            fi

            # Script writes audit-complete-<batch_id>.marker when batch is finished
            MARKER_FILE="audit-complete-${BATCH_ID}.marker"
            if [ -f "$MARKER_FILE" ]; then
              echo "Batch $BATCH_ID complete — uploading idempotency marker artifact."
              # Stage for artifact upload (one file per completed batch)
              mkdir -p completed-batches
              cp "$MARKER_FILE" "completed-batches/${BATCH_ID}.txt"
            else
              echo "Batch $BATCH_ID still in_progress — will retry on next scheduled poll."
            fi
          done

      # ── Stage combined processed-batches manifest for upload ─────────────
      # PM3-88 fix: the previous step (a Python heredoc that only print()-ed
      # without uploading) has been removed. The idempotency mechanism is now
      # purely the combined "processed-batches-<run_id>" artifact, written
      # once per run and grep'd by future polls.
      - name: Stage combined processed-batches manifest
        if: steps.gate.outputs.skip == 'false'
        run: |
          set -euo pipefail
          shopt -s nullglob
          MARKERS=(completed-batches/*.txt)
          if [ "${#MARKERS[@]}" -eq 0 ]; then
            echo "No completed batches this run; nothing to stage."
            : > all-processed-this-run.txt
            exit 0
          fi
          # Each marker filename is the batch id; aggregate into a flat list.
          for marker_file in "${MARKERS[@]}"; do
            BATCH_ID=$(basename "$marker_file" .txt)
            echo "$BATCH_ID"
          done > all-processed-this-run.txt
          echo "Combined processed list (this run):"
          cat all-processed-this-run.txt

      - name: Upload combined processed-batches artifact
        if: steps.gate.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          # Name encodes the run so it's unique; contents list batch IDs.
          # The idempotency check searches ALL processed-batches-* artifacts
          # for the specific batch ID, not just this one.
          name: processed-batches-${{ github.run_id }}
          path: all-processed-this-run.txt
          retention-days: 30
          if-no-files-found: ignore
