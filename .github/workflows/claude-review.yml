name: Claude review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate-pr-link:
    name: PR must reference Jira (PM3-N)
    runs-on: ubuntu-latest
    # Exempt Dependabot — its auto-generated PRs cannot include a PM3 reference.
    # Human-authored PRs still require the linked ticket. (PM3-83)
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Check PR title/body references PM3-N
        env:
          TITLE: ${{ github.event.pull_request.title }}
          BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          if echo "$TITLE $BODY" | grep -qE 'PM3-[0-9]+'; then
            echo "Linked Jira ticket found."
          else
            echo "::error::PR must reference a Jira ticket (PM3-N) in the title or body. See CONTRIBUTING.md."
            exit 1
          fi

  validate-plugin-structure:
    name: Validate plugin layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/validate_plugin.py

  test:
    name: Tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect dep file (controls pip cache)
        id: deps
        run: |
          if [ -f requirements.txt ] || [ -f pyproject.toml ]; then
            echo "has_deps=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_deps=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup Python (with pip cache)
        if: steps.deps.outputs.has_deps == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Setup Python (no cache, no deps file present)
        if: steps.deps.outputs.has_deps == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install -e . || true; fi
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          if [ -d tests ] || [ -d test ]; then
            pytest --cov=. --cov-report=xml
          else
            echo "No tests directory yet (PM3-49 will fix); skipping"
          fi
      - name: Upload coverage to Codecov
        if: hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  claude-review:
    name: Claude code review
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - name: Skip cleanly when ANTHROPIC_API_KEY is not set
        id: gate
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::ANTHROPIC_API_KEY not set on this repo; skipping Claude review (set via Settings → Secrets and variables → Actions)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip == 'false'
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip == 'false'
        with:
          python-version: "3.11"
      - name: Install Claude Code CLI
        if: steps.gate.outputs.skip == 'false'
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> "$GITHUB_PATH"
      - name: Download prior findings for dedup
        if: steps.gate.outputs.skip == 'false'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          CACHE_DIR="$RUNNER_TEMP/claude-review-cache"
          PR_NUM="${{ github.event.pull_request.number }}"
          PRIOR_FILE="$CACHE_DIR/pr-${PR_NUM}-prior.json"
          mkdir -p "$CACHE_DIR"

          # Find the most recent completed run of this workflow on the same branch,
          # excluding the current run so we don't self-reference.
          PRIOR_RUN_ID=$(gh run list \
            --branch "${{ github.head_ref }}" \
            --workflow claude-review.yml \
            --status completed \
            --limit 5 \
            --json databaseId \
            --jq "[.[].databaseId | select(. != ${{ github.run_id }})] | first // empty") || {
            echo "gh run list failed; writing empty prior."
            echo "[]" > "$PRIOR_FILE"
            exit 0
          }

          if [ -z "$PRIOR_RUN_ID" ]; then
            echo "No prior completed run found for this branch; writing empty prior."
            echo "[]" > "$PRIOR_FILE"
          else
            ARTIFACT_NAME="findings-${PRIOR_RUN_ID}"
            DOWNLOAD_DIR="$RUNNER_TEMP/claude-review-dl"
            mkdir -p "$DOWNLOAD_DIR"
            if gh run download "$PRIOR_RUN_ID" \
                --name "$ARTIFACT_NAME" \
                --dir "$DOWNLOAD_DIR" 2>/dev/null; then
              DOWNLOADED="$DOWNLOAD_DIR/findings.json"
              if [ -f "$DOWNLOADED" ]; then
                mv "$DOWNLOADED" "$PRIOR_FILE"
                echo "Prior findings loaded from run ${PRIOR_RUN_ID}."
              else
                echo "Artifact downloaded but findings.json not found; writing empty prior."
                echo "[]" > "$PRIOR_FILE"
              fi
            else
              echo "Artifact ${ARTIFACT_NAME} not available (expired or never uploaded); writing empty prior."
              echo "[]" > "$PRIOR_FILE"
            fi
          fi
      - name: Run headless Claude review
        if: steps.gate.outputs.skip == 'false'
        timeout-minutes: 8
        run: |
          python scripts/claude_review.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --output findings.json
      - name: Post findings as inline PR review
        if: steps.gate.outputs.skip == 'false' && always() && hashFiles('findings.json') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python scripts/post_findings.py --findings findings.json
      - name: Upload findings artifact (for dedup on next push)
        if: steps.gate.outputs.skip == 'false' && always() && hashFiles('findings.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: findings-${{ github.run_id }}
          path: findings.json
          retention-days: 14
