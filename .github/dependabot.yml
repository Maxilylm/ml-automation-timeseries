version: 2

updates:
  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    labels: [dependencies, github-actions]

  # Python deps disabled until plugins commit a requirements.txt or pyproject.toml
  # at the repo root. Dependabot fails its daily ecosystem check otherwise (PM3-81).
  # Re-enable per plugin by adding a block here once the plugin has tracked deps:
  # - package-ecosystem: pip
  #   directory: /
  #   schedule: { interval: weekly, day: monday }
  #   groups:
  #     minor-and-patch:
  #       update-types: [minor, patch]
  #   labels: [dependencies]
